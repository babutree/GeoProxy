services:
  goproxy:
    image: ghcr.io/isboyjc/goproxy:latest
    pull_policy: always

    # For local builds, comment image/pull_policy and uncomment build.
    # build: .

    container_name: ${CONTAINER_NAME:-goproxy}
    restart: unless-stopped
    ports:
      - "${WEBUI_PORT:-7800}:7800"     # WebUI
      - "${SOCKS5_PORT:-7801}:7801"   # SOCKS5 proxy
      - "${HTTP_PORT:-7802}:7802"     # HTTP proxy
    volumes:
      - goproxy-data:/app/data
    environment:
      - TZ=${TZ:-Asia/Shanghai}
      - DATA_DIR=/app/data
      - WEBUI_PASSWORD=${WEBUI_PASSWORD:-goproxy}
      - PROXY_AUTH_ENABLED=${PROXY_AUTH_ENABLED:-false}
      - PROXY_AUTH_USERNAME=${PROXY_AUTH_USERNAME:-acct}
      - PROXY_AUTH_PASSWORD=${PROXY_AUTH_PASSWORD}
      - SESSION_TTL_MINUTES=${SESSION_TTL_MINUTES:-10}
      - DEFAULT_REGION=${DEFAULT_REGION}
      - ALLOWED_COUNTRIES=${ALLOWED_COUNTRIES}
      - BLOCKED_COUNTRIES=${BLOCKED_COUNTRIES}
      - HEALTH_CHECK_INTERVAL=${HEALTH_CHECK_INTERVAL:-5}
      - MAX_RETRY=${MAX_RETRY:-3}
      - SINGBOX_PATH=${SINGBOX_PATH:-sing-box}
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:7800/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  goproxy-data:
